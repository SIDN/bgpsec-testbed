services: 
  bird_one:
    container_name: bird_one
    image: bird
    build:
      context: ../../../docker_images/bird
      network: host
    volumes:
     - ../../configs/bird/bird_as64602.conf:/etc/bird.conf
     - ../../../key_setup/bird_testbed_keys/bgpsec-keys:/usr/share/bird/bgpsec-keys/
     - ../../../key_setup/bird_testbed_keys/bgpsec-private-keys:/usr/share/bird/bgpsec-private-keys
    networks:
      bgp:
        ipv4_address: 10.0.0.2
  
  bird_two:
    container_name: bird_two
    image: bird
    build:
      context: ../../../docker_images/bird
      network: host
    volumes:
      - ../../configs/bird/bird_as64603.conf:/etc/bird.conf
      - ../../../key_setup/bird_testbed_keys/bgpsec-keys:/usr/share/bird/bgpsec-keys/
      - ../../../key_setup/bird_testbed_keys/bgpsec-private-keys:/usr/share/bird/bgpsec-private-keys
    networks:
      bgp:
        ipv4_address: 10.0.0.3

networks:
  bgp:
    driver_opts:
      com.docker.network.bridge.name: br-bgp 
    ipam:
      driver: default
      config: 
        - subnet: 10.0.0.0/8
