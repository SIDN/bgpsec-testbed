services: 
  gobgpsrx_one:
    container_name: gobgpsrx_one
    image: gobgpsrx
    build:
      context: ../../../docker_images/gobgpsrx
      network: host
    volumes: 
      - ../../../key_setup/testbed_keys:/var/lib/bgpsec-keys
      - ../../configs/gobgpsrx/gobgpd-as64602.conf:/etc/gobgpd.conf
      - ../../configs/srxcryptoapi.conf:/usr/local/etc/srxcryptoapi.conf
    networks:
      bgp:
        ipv4_address: 10.0.0.2

  gobgpsrx_two:
    container_name: gobgpsrx_two
    image: gobgpsrx
    build:
      context: ../../../docker_images/gobgpsrx
      network: host
    volumes:     
      - ../../../key_setup/testbed_keys:/var/lib/bgpsec-keys
      - ../../configs/gobgpsrx/gobgpd-as64603.conf:/etc/gobgpd.conf
      - ../../configs/srxcryptoapi.conf:/usr/local/etc/srxcryptoapi.conf
    networks:
      bgp:
        ipv4_address: 10.0.0.3


networks:
  bgp:
    driver_opts:
      com.docker.network.bridge.name: br-bgp 
    ipam:
      driver: default
      config: 
        - subnet: 10.0.0.0/8
