debug rpki
debug bgp updates
debug bgp bgpsec

rpki
    rpki cache 10.0.0.14 3323 preference 1

router bgp 64602
    bgp router-id 10.0.0.2
    bgpsec privkey /var/lib/bgpsec-keys/<SKI>.der
    bgpsec privkey ski <SKI>
	
    neighbor 10.0.0.3 remote-as 64603
    neighbor 10.0.0.3 capability bgpsec both any

    address-family ipv4 unicast
        network 10.2.0.0/16
        neighbor 10.0.0.3 next-hop-self
        neighbor 10.0.0.3 prefix-list bgpsec-test in
        neighbor 10.0.0.3 prefix-list bgpsec-test out

ip prefix-list bgpsec-test seq 5 permit any
