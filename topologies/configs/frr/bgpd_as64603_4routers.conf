debug rpki
debug bgp bgpsec
debug bgp updates

rpki
    rpki cache 10.0.0.14 3323 preference 1

router bgp 64603
    bgp router-id 10.0.0.3
    bgpsec privkey /var/lib/bgpsec-keys/<SKI>.der
    bgpsec privkey ski <SKI>
    
    neighbor 10.0.0.2 remote-as 64602
    neighbor 10.0.0.2 capability bgpsec both any

    neighbor 10.0.0.4 remote-as 64604
    neighbor 10.0.0.4 capability bgpsec both any

    address-family ipv4 unicast
        network 10.3.0.0/16
        neighbor 10.0.0.2 next-hop-self
        neighbor 10.0.0.2 prefix-list bgpsec-test in
        neighbor 10.0.0.2 prefix-list bgpsec-test out 

        neighbor 10.0.0.4 next-hop-self
        neighbor 10.0.0.4 prefix-list bgpsec-test in
        neighbor 10.0.0.4 prefix-list bgpsec-test out 

ip prefix-list bgpsec-test seq 5 permit any
