! -*- bgp -*-
!
! QuaggaSRx BGPd sample configuration file
!
! $Id: bgpd.conf.sampleSRx,v 6.0 2021/04/12 14:55:38 ob Exp $
!
hostname bgpd
password zebra

router bgp 64604
  bgp router-id 10.0.0.4

  srx display
  srx set-proxy-id 10.0.0.4

  srx set-server 10.0.0.15 17900
  srx connect
  no srx extcommunity

!  srx evaluation origin
  srx evaluation bgpsec distributed
  srx set-bgpsec-value undefined

!
! Configure "Prefer Valid" using local preference
! Increase the local preference if route is valid.
!

  srx policy bgpsec local-preference valid   add      20 
  srx policy bgpsec local-preference invalid subtract 20 

  no srx policy bgpsec ignore undefined

  srx bgpsec ski 0 1 <SKI>
  srx bgpsec active 0

! Specify Local Networks
! ======================
  network 10.4.0.0/16

! Specify Neighbors
! =================
  ! neighbor AS 64603
  neighbor 10.0.0.3 remote-as 64603
  neighbor 10.0.0.3 bgpsec both

  neighbor 10.0.0.5 remote-as 64605
  neighbor 10.0.0.5 bgpsec both
log stdout
